<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okba Islamic Centre - Prayer Times</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a1628;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --accent: #c9a84c;
      --accent-glow: rgba(201,168,76,0.3);
      --text-primary: #f0ece4;
      --text-secondary: rgba(240,236,228,0.6);
      --text-muted: rgba(240,236,228,0.35);
      --highlight-bg: rgba(201,168,76,0.12);
      --highlight-border: rgba(201,168,76,0.5);
      --border: rgba(255,255,255,0.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Subtle background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(30,80,140,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 1.2vh 3vw;
      gap: 1vh;
    }

    /* ── Header ── */
    .header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      min-height: 19vh;
    }

    .mosque-logo {
      position: absolute;
      left: 0;
      height: 18vh;
      width: auto;
    }

    #fullscreen-btn {
      position: fixed;
      top: 1vh;
      right: 1vw;
      z-index: 999;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-secondary);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 1.4vh;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    #fullscreen-btn:hover, #fullscreen-btn:focus {
      opacity: 1;
    }

    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3vh;
    }

    .mosque-name h1 {
      font-size: 3.2vh;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .clock-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .clock {
      font-size: 9vh;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      line-height: 1;
    }

    .clock .seconds {
      font-size: 5vh;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .clock .ampm {
      font-size: 2.8vh;
      font-weight: 500;
      color: var(--text-muted);
      margin-left: 0.5vw;
    }

    .date-section {
      position: absolute;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3vh;
    }

    .gregorian-date {
      font-size: 2.4vh;
      font-weight: 500;
      color: var(--text-primary);
    }

    .hijri-date {
      font-size: 2.2vh;
      font-weight: 400;
      color: var(--accent);
      font-family: 'Amiri', serif;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), var(--accent-glow), var(--border), transparent);
      flex-shrink: 0;
    }

    /* ── Next Prayer Banner ── */
    .next-prayer-banner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.8vh 2vw;
      background: var(--highlight-bg);
      border: 1px solid var(--highlight-border);
      border-radius: 0.8vh;
      flex-shrink: 0;
      overflow: hidden;
      transition: border-color 0.5s ease, background 0.5s ease;
    }

    .next-prayer-banner.alert-active {
      border-color: rgba(231,76,60,0.6);
      background: rgba(231,76,60,0.08);
    }

    .next-prayer-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2vw;
      transition: opacity 0.4s ease;
    }

    .next-prayer-content.hidden {
      opacity: 0;
      pointer-events: none;
      position: absolute;
    }

    .next-prayer-banner .label {
      font-size: 2.2vh;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .next-prayer-banner .prayer-name {
      font-size: 3vh;
      font-weight: 700;
      color: var(--accent);
    }

    .next-prayer-banner .countdown {
      font-size: 2.8vh;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .change-alert {
      display: none;
      white-space: nowrap;
      font-size: 2.4vh;
      font-weight: 600;
      color: #e74c3c;
    }

    .change-alert.visible {
      display: block;
      animation: marquee var(--marquee-duration, 14s) linear;
    }

    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* ── Prayer Table ── */
    .prayer-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5vh;
      min-height: 0;
    }

    .prayer-grid-header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 0.4vh 2vw;
      gap: 1vw;
      flex-shrink: 0;
    }

    .prayer-grid-header span {
      font-size: 2vh;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .prayer-grid-header span:not(:first-child) {
      text-align: center;
    }

    .prayer-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      padding: 0 2vw;
      gap: 1vw;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.8vh;
      transition: all 0.4s ease;
      flex: 1;
      min-height: 0;
    }

    .prayer-row.active {
      background: var(--highlight-bg);
      border-color: var(--highlight-border);
      box-shadow: 0 0 20px rgba(201,168,76,0.08);
    }

    .prayer-row.sunrise-row {
      grid-template-columns: 1fr 2fr;
    }

    .prayer-info {
      display: flex;
      align-items: center;
      gap: 0.8vw;
    }

    .prayer-icon {
      width: 4vh;
      height: 4vh;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }

    .prayer-row.active .prayer-icon {
      background: rgba(201,168,76,0.15);
    }

    .prayer-icon svg {
      width: 2.6vh;
      height: 2.6vh;
      fill: var(--accent);
    }

    .prayer-names {
      display: flex;
      flex-direction: column;
      gap: 0.1vh;
    }

    .prayer-name-en {
      font-size: 2.8vh;
      font-weight: 600;
      color: var(--text-primary);
    }

    .prayer-row.active .prayer-name-en {
      color: var(--accent);
    }

    .prayer-name-ar {
      font-family: 'Amiri', serif;
      font-size: 2.2vh;
      color: var(--text-secondary);
    }

    .prayer-time {
      text-align: center;
      font-size: 3.4vh;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
    }

    .prayer-row.active .prayer-time {
      color: var(--accent);
    }

    .prayer-time.sunrise-time {
      text-align: center;
    }

    .prayer-time-label {
      font-size: 1.2vh;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-align: center;
      margin-top: 0.2vh;
    }

    /* Jumu'ah row special */
    .prayer-row.jumuah-row {
      border-style: dashed;
    }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0;
      text-align: center;
      padding: 0.5vh 0;
      font-size: 1.3vh;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* Pulse animation for active row indicator */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .active-indicator {
      width: 0.5vw;
      height: 0.5vw;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
      margin-right: 0.5vw;
    }
  </style>
</head>

  <script>
    let prayerData = [];

    // Load prayer times data
    fetch('prayer_times.json')
      .then(r => r.json())
      .then(data => {
        prayerData = data;
        updateDisplay();
        setupChangeAlert();
      })
      .catch(err => console.error('Failed to load prayer times:', err));

    // Format time from 24h "HH:MM" to 12h display
    function formatTime12(timeStr) {
      if (!timeStr) return '—';
      const [h, m] = timeStr.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const hour12 = h % 12 || 12;
      return `${hour12}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    // Parse "HH:MM" to today's Date object
    function parseTimeToday(timeStr) {
      if (!timeStr) return null;
      const [h, m] = timeStr.split(':').map(Number);
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
    }

    function formatDateStr(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }

    function getDisplayData() {
      const now = new Date();
      const todayStr = formatDateStr(now);
      const todayData = prayerData.find(d => d.date === todayStr);

      // After Isha iqama + 15 min, switch to tomorrow's times
      if (todayData && todayData.ishaIqama) {
        const ishaIqamaDate = parseTimeToday(todayData.ishaIqama);
        if (ishaIqamaDate) {
          ishaIqamaDate.setMinutes(ishaIqamaDate.getMinutes() + 10);
          if (now >= ishaIqamaDate) {
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = formatDateStr(tomorrow);
            const tomorrowData = prayerData.find(d => d.date === tomorrowStr);
            if (tomorrowData) return tomorrowData;
          }
        }
      }

      return todayData;
    }

    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').innerHTML =
        `${h}:${String(m).padStart(2,'0')}<span class="seconds">:${String(s).padStart(2,'0')}</span> <span class="ampm">${ampm}</span>`;
    }

    function updateDate() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('gregorianDate').textContent = now.toLocaleDateString('en-US', options);

      // Hijri date using Intl
      try {
        const hijriFormatter = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {
          day: 'numeric', month: 'long', year: 'numeric'
        });
        const hijriArFormatter = new Intl.DateTimeFormat('ar-u-ca-islamic-umalqura', {
          day: 'numeric', month: 'long', year: 'numeric'
        });
        document.getElementById('hijriDate').textContent =
          hijriFormatter.format(now) + '  ·  ' + hijriArFormatter.format(now);
      } catch(e) {
        document.getElementById('hijriDate').textContent = '';
      }
    }

    function updateDisplay() {
      const data = getDisplayData();
      if (!data) {
        console.warn('No prayer data for today');
        return;
      }

      // Set prayer times
      document.getElementById('fajr-start').textContent = formatTime12(data.fajrStart);
      document.getElementById('fajr-iqama').textContent = formatTime12(data.fajrIqama);
      document.getElementById('sunrise-start').textContent = formatTime12(data.sunrise);
      document.getElementById('dhuhr-start').textContent = formatTime12(data.zuhrStart);
      document.getElementById('dhuhr-iqama').textContent = formatTime12(data.zuhrIqama);
      document.getElementById('asr-start').textContent = formatTime12(data.asrStart);
      document.getElementById('asr-iqama').textContent = formatTime12(data.asrIqama);
      document.getElementById('maghrib-start').textContent = formatTime12(data.maghribStart);
      document.getElementById('maghrib-iqama').textContent = formatTime12(data.maghribIqama);
      document.getElementById('isha-start').textContent = formatTime12(data.ishaStart);
      document.getElementById('isha-iqama').textContent = formatTime12(data.ishaIqama);
      document.getElementById('jumuah-start').textContent = formatTime12(data.zuhrStart);
      document.getElementById('jumuah-iqama').textContent = formatTime12(data.jummah1);

      // Jumu'ah row always visible
      document.getElementById('row-jumuah').style.display = '';

      updateNextPrayer(data);
    }

    function updateNextPrayer(data) {
      const now = new Date();
      const prayers = [
        { key: 'fajr', name: 'Fajr', time: data.fajrStart, iqama: data.fajrIqama },
        { key: 'dhuhr', name: 'Dhuhr', time: data.zuhrStart, iqama: data.zuhrIqama },
        { key: 'asr', name: 'Asr', time: data.asrStart, iqama: data.asrIqama },
        { key: 'maghrib', name: 'Maghrib', time: data.maghribStart, iqama: data.maghribIqama },
        { key: 'isha', name: 'Isha', time: data.ishaStart, iqama: data.ishaIqama },
      ];

      // Clear all active states
      document.querySelectorAll('.prayer-row').forEach(r => r.classList.remove('active'));

      let nextPrayer = null;
      for (const p of prayers) {
        const iqamaTime = parseTimeToday(p.iqama);
        if (iqamaTime && iqamaTime > now) {
          nextPrayer = p;
          break;
        }
      }

      if (!nextPrayer) {
        // All prayers passed — next is tomorrow's Fajr
        document.getElementById('nextPrayerName').textContent = 'Fajr';
        const tomorrowFajr = parseTimeToday(data.fajrIqama);
        tomorrowFajr.setDate(tomorrowFajr.getDate() + 1);
        const diff = tomorrowFajr - now;
        document.getElementById('nextPrayerCountdown').textContent = formatCountdown(diff);
        document.getElementById('row-fajr').classList.add('active');
      } else {
        document.getElementById('nextPrayerName').textContent = nextPrayer.name;
        const iqamaTime = parseTimeToday(nextPrayer.iqama);
        const diff = iqamaTime - now;
        document.getElementById('nextPrayerCountdown').textContent = formatCountdown(diff);
        document.getElementById(`row-${nextPrayer.key}`).classList.add('active');
      }
    }

    function formatCountdown(ms) {
      if (ms < 0) return '—';
      const totalMin = Math.floor(ms / 60000);
      const hours = Math.floor(totalMin / 60);
      const mins = totalMin % 60;
      if (hours > 0) {
        return `${hours}h ${mins}m remaining`;
      }
      return `${mins}m remaining`;
    }

    // Detect iqama time changes between today and tomorrow
    function getIqamaChanges() {
      const now = new Date();
      const todayStr = formatDateStr(now);
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const tomorrowStr = formatDateStr(tomorrow);

      const todayData = prayerData.find(d => d.date === todayStr);
      const tomorrowData = prayerData.find(d => d.date === tomorrowStr);

      if (!todayData || !tomorrowData) return [];

      const fields = [
        { key: 'fajrIqama', name: 'Fajr' },
        { key: 'zuhrIqama', name: 'Dhuhr' },
        { key: 'asrIqama', name: 'Asr' },
        { key: 'ishaIqama', name: 'Isha' },
      ];

      const changes = [];
      for (const f of fields) {
        if (todayData[f.key] !== tomorrowData[f.key]) {
          changes.push({ name: f.name, newTime: formatTime12(tomorrowData[f.key]) });
        }
      }
      return changes;
    }

    // Banner toggle state
    let bannerShowingAlert = false;
    let bannerToggleTimeout = null;
    let bannerAlertActive = false;

    function showNextPrayerContent() {
      const alertEl = document.getElementById('changeAlert');
      const contentEl = document.getElementById('nextPrayerContent');
      const bannerEl = document.getElementById('nextPrayerBanner');

      alertEl.classList.remove('visible');
      contentEl.classList.remove('hidden');
      bannerEl.classList.remove('alert-active');
      bannerShowingAlert = false;

      // Show next prayer for 8s, then show alert again
      if (bannerAlertActive) {
        bannerToggleTimeout = setTimeout(showChangeAlert, 20000);
      }
    }

    function showChangeAlert() {
      const alertEl = document.getElementById('changeAlert');
      const contentEl = document.getElementById('nextPrayerContent');
      const bannerEl = document.getElementById('nextPrayerBanner');

      contentEl.classList.add('hidden');
      alertEl.classList.remove('visible');
      // Force reflow to restart animation
      void alertEl.offsetWidth;
      // Scale duration to text length so it fully scrolls off
      const textWidth = alertEl.scrollWidth;
      const speed = 200; // pixels per second
      alertEl.style.setProperty('--marquee-duration', (textWidth / speed) + 's');
      alertEl.classList.add('visible');
      bannerEl.classList.add('alert-active');
      bannerShowingAlert = true;
    }

    function setupChangeAlert() {
      const changes = getIqamaChanges();
      const alertEl = document.getElementById('changeAlert');
      const contentEl = document.getElementById('nextPrayerContent');
      const bannerEl = document.getElementById('nextPrayerBanner');

      if (changes.length === 0) {
        // No changes — always show next prayer, stop toggling
        alertEl.classList.remove('visible');
        contentEl.classList.remove('hidden');
        bannerEl.classList.remove('alert-active');
        if (bannerToggleTimeout) {
          clearTimeout(bannerToggleTimeout);
          bannerToggleTimeout = null;
        }
        bannerAlertActive = false;
        bannerShowingAlert = false;
        return;
      }

      // Build change message
      const parts = changes.map(c => `${c.name} Iqama at ${c.newTime}`);
      alertEl.textContent = 'From tomorrow:  ' + parts.join('   ·   ');

      // Listen for animation end to switch back to next prayer
      if (!bannerAlertActive) {
        bannerAlertActive = true;
        alertEl.addEventListener('animationend', showNextPrayerContent);
        // Start the first cycle after 8s
        bannerToggleTimeout = setTimeout(showChangeAlert, 20000);
      }
    }

    // Initial setup
    updateClock();
    updateDate();

    // Update clock every second
    setInterval(updateClock, 1000);

    // Update prayer times and next prayer every 30 seconds
    setInterval(() => {
      updateDisplay();
      updateDate();
      setupChangeAlert();
    }, 30000);

    function toggleFullscreen() {
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
      }
    }
  </script>
</body>
</html>

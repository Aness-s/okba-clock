<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okba Islamic Centre - Prayer Times</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <img src="OkbaLogo_no_TEXT.svg" alt="Okba Islamic Centre" class="mosque-logo">
      <div class="header-center">
        <div class="mosque-name">
          <h1>Okba Islamic Centre</h1>
        </div>
        <div class="clock-section">
          <div class="clock" id="clock"></div>
        </div>
      </div>
      <div class="date-section">
        <div class="gregorian-date" id="gregorianDate"></div>
        <div class="hijri-date" id="hijriDate"></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Next Prayer Banner -->
    <div class="next-prayer-banner" id="nextPrayerBanner">
      <div class="next-prayer-content" id="nextPrayerContent">
        <span class="label">Next Prayer</span>
        <span class="prayer-name" id="nextPrayerName">—</span>
        <span class="countdown" id="nextPrayerCountdown">—</span>
      </div>
      <div class="change-alert" id="changeAlert"></div>
    </div>

    <!-- Prayer Grid -->
    <div class="prayer-grid">
      <div class="prayer-grid-header">
        <span>Salah</span>
        <span>Begins</span>
        <span>Iqamah</span>
      </div>

      <div class="prayer-row" id="row-fajr">
        <div class="prayer-info">
          <div class="prayer-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" style="fill:none"/><path d="M20 15.31L23.31 12 20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69zM12 18V6c3.31 0 6 2.69 6 6s-2.69 6-6 6z"/></svg>
          </div>
          <div class="prayer-names">
            <div class="prayer-name-en">Fajr</div>
            <div class="prayer-name-ar">الفجر</div>
          </div>
        </div>
        <div><div class="prayer-time" id="fajr-start">—</div></div>
        <div><div class="prayer-time" id="fajr-iqama">—</div></div>
      </div>

      <div class="prayer-row sunrise-row" id="row-sunrise">
        <div class="prayer-info">
          <div class="prayer-icon">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v2H3v-2zm0-4h2v2H3v-2zm4 0h2v2H7v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2zM12 6l-4 4h3v4h2v-4h3L12 6z" style="fill:none"/><path d="M12 2L6.5 7.5h3V12h5V7.5h3L12 2zM3 16h2v2H3v-2zm4 0h2v2H7v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2zM3 20h18v2H3v-2z" style="fill:none"/><path d="M3 18h18v-2H3v2zm9-16L6.5 7.5h3V12h5V7.5h3L12 2z"/></svg>
          </div>
          <div class="prayer-names">
            <div class="prayer-name-en">Sunrise</div>
            <div class="prayer-name-ar">الشروق</div>
          </div>
        </div>
        <div><div class="prayer-time sunrise-time" id="sunrise-start">—</div></div>
      </div>

      <div class="prayer-row" id="row-dhuhr">
        <div class="prayer-info">
          <div class="prayer-icon">
            <svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
          </div>
          <div class="prayer-names">
            <div class="prayer-name-en">Dhuhr</div>
            <div class="prayer-name-ar">الظهر</div>
          </div>
        </div>
        <div><div class="prayer-time" id="dhuhr-start">—</div></div>
        <div><div class="prayer-time" id="dhuhr-iqama">—</div></div>
      </div>

      <div class="prayer-row" id="row-asr">
        <div class="prayer-info">
          <div class="prayer-icon">
            <svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>
          </div>
          <div class="prayer-names">
            <div class="prayer-name-en">Asr</div>
            <div class="prayer-name-ar">العصر</div>
          </div>
        </div>
        <div><div class="prayer-time" id="asr-start">—</div></div>
        <div><div class="prayer-time" id="asr-iqama">—</div></div>
      </div>

      <div class="prayer-row" id="row-maghrib">
        <div class="prayer-info">
          <div class="prayer-icon">
            <svg viewBox="0 0 24 24"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zm-2 5.79V18h-3.52L12 20.48 9.52 18H6v-3.52L3.52 12 6 9.52V6h3.52L12 3.52 14.48 6H18v3.52L20.48 12 18 14.48zM12 6.5c-3.03 0-5.5 2.47-5.5 5.5s2.47 5.5 5.5 5.5 5.5-2.47 5.5-5.5-2.47-5.5-5.5-5.5z"/></svg>
          </div>
          <div class="prayer-names">
            <div class="prayer-name-en">Maghrib</div>
            <div class="prayer-name-ar">المغرب</div>
          </div>
        </div>
        <div><div class="prayer-time" id="maghrib-start">—</div></div>
        <div><div class="prayer-time" id="maghrib-iqama">—</div></div>
      </div>

      <div class="prayer-row" id="row-isha">
        <div class="prayer-info">
          <div class="prayer-icon">
            <svg viewBox="0 0 24 24"><path d="M12.43 2.3c-2.38-.59-4.68-.27-6.63.64-.35.16-.41.64-.1.86C8.3 5.6 9.67 8.5 9.08 11.58c-.6 3.15-3.07 5.42-6.04 5.93-.39.07-.56.51-.31.81C4.62 20.64 7.39 22 10.55 22c4.98 0 8.91-4.37 8.32-9.48-.46-3.97-3.58-7.16-6.44-10.22z" style="fill:none"/><path d="M9.5 2c-1.82 0-3.53.5-5 1.35 2.99 1.73 5 4.95 5 8.65s-2.01 6.92-5 8.65C5.97 21.5 7.68 22 9.5 22c5.52 0 10-4.48 10-10S15.02 2 9.5 2z"/></svg>
          </div>
          <div class="prayer-names">
            <div class="prayer-name-en">Isha</div>
            <div class="prayer-name-ar">العشاء</div>
          </div>
        </div>
        <div><div class="prayer-time" id="isha-start">—</div></div>
        <div><div class="prayer-time" id="isha-iqama">—</div></div>
      </div>

      <div class="prayer-row jumuah-row" id="row-jumuah">
        <div class="prayer-info">
          <div class="prayer-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C11.2 2 10.5 2.7 10.5 3.5V4.6C9.4 5 8.5 5.9 8 7H5L3 9V11H5V20H3V22H21V20H19V11H21V9L19 7H16C15.5 5.9 14.6 5 13.5 4.6V3.5C13.5 2.7 12.8 2 12 2ZM12 4C12.3 4 12.5 4.2 12.5 4.5V5H11.5V4.5C11.5 4.2 11.7 4 12 4ZM12 6C13.1 6 14 6.9 14 8C14 9.1 13.1 10 12 10C10.9 10 10 9.1 10 8C10 6.9 10.9 6 12 6ZM7 9H9.1C9.5 10.2 10.6 11 12 11C13.4 11 14.5 10.2 14.9 9H17L18 10V11H6V10L7 9ZM7 13H17V20H15V16H13V20H11V16H9V20H7V13Z"/></svg>
          </div>
          <div class="prayer-names">
            <div class="prayer-name-en">Jumu'ah</div>
            <div class="prayer-name-ar">الجمعة</div>
          </div>
        </div>
        <div><div class="prayer-time" id="jumuah-start">—</div></div>
        <div><div class="prayer-time" id="jumuah-iqama">—</div></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
